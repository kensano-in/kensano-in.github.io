apiVersion: v1
kind: Secret
metadata:
  name: messaging-secrets
  namespace: messaging-platform
type: Opaque
stringData:
  # Database passwords (CHANGE IN PRODUCTION!)
  POSTGRES_USER: "messaging_user"
  POSTGRES_PASSWORD: "secure_password_change_me"
  
  CASSANDRA_USER: "cassandra"
  CASSANDRA_PASSWORD: "cassandra_password_change_me"
  
  REDIS_PASSWORD: "redis_password_change_me"
  
  # JWT Secret (CHANGE IN PRODUCTION!)
  JWT_SECRET: "your-super-secret-jwt-key-change-in-production-min-32-chars"
  
  # Encryption keys (CHANGE IN PRODUCTION!)
  MESSAGE_ENCRYPTION_KEY: "message-encryption-key-32-chars-long"
  MEDIA_ENCRYPTION_KEY: "media-encryption-key-32-chars-long"
  
  # External service API keys
  FCM_SERVER_KEY: "your-fcm-server-key"
  APNS_KEY_ID: "your-apns-key-id"
  APNS_TEAM_ID: "your-apns-team-id"
  APNS_PRIVATE_KEY: "your-apns-private-key"
  
  # Object storage credentials
  S3_ACCESS_KEY: "your-s3-access-key"
  S3_SECRET_KEY: "your-s3-secret-key"
  
  # Elasticsearch credentials
  ELASTICSEARCH_USER: "elastic"
  ELASTICSEARCH_PASSWORD: "elastic_password_change_me"
---
# SealedSecret example for GitOps workflows
# Use sealed-secrets controller to encrypt secrets for Git storage
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: messaging-secrets-encrypted
  namespace: messaging-platform
spec:
  encryptedData:
    # These values are encrypted with the cluster's public key
    # Use kubeseal to encrypt: kubeseal --scope cluster-wide < secret.yaml > sealed-secret.yaml
    POSTGRES_PASSWORD: "AgBy..."
    JWT_SECRET: "AgBy..."
